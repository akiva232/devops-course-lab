name: CI/CD Pipeline

# הפייפליין ירוץ אוטומטית רק כשקוד חדש נכנס ל-main (למשל אחרי מיזוג PR)
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    # הגדרת הרשאות מאובטחות לטוקן האוטומטי של ה-Job
    permissions:
      contents: read
      packages: write

    steps:
      # 1. הורדת הקוד למכונה
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. התחברות מאובטחת ל-GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # המשתמש שהריץ את הפייפליין
          password: ${{ secrets.GITHUB_TOKEN }} # טוקן זמני ומאובטח שנוצר אוטומטית

      # 3. בניית ה-Image ודחיפה שלו ל-GHCR
      # שים לב לשם של ה-Image: הוא חייב להכיל את כתובת ה-registry ושם המשתמש באותיות קטנות (lowercase)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-devops-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/my-devops-app:latest